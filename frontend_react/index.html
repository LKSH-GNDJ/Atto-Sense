<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AttoSense · Intent Intelligence</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
    <!-- Liberation Serif via system font, Libre Baskerville as web fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <style>
      /* Attempt Liberation Serif from system before Libre Baskerville kicks in */
      @font-face {
        font-family: 'Liberation Serif';
        src: local('Liberation Serif'), local('LiberationSerif');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'Liberation Serif';
        src: local('Liberation Serif Bold'), local('LiberationSerif-Bold');
        font-weight: 700;
        font-style: normal;
      }
      @font-face {
        font-family: 'Liberation Serif';
        src: local('Liberation Serif Italic'), local('LiberationSerif-Italic');
        font-weight: 400;
        font-style: italic;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { height: 100%; }
      body { height: 100%; background: #F4F0E6; }
      #root { height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
